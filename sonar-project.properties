# SonarQube Project Configuration
sonar.projectKey=BRASO-PLATS-UI
sonar.projectName=BRASO PLATS UI
sonar.projectVersion=1.0

# Source directories
sonar.sources=tests,utils,resusableComp
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/test-results/**,**/playwright-report/**,**/logs/**,.git/**

# Language
sonar.language=ts

# Test files and coverage
sonar.tests=tests
sonar.test.inclusions=**/*.spec.ts

# Code coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Issue exclusion
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=*
sonar.issue.ignore.multicriteria.e1.resourceKey=**/node_modules/**

# Analysis timeout (in seconds)
sonar.sourceEncoding=UTF-8
