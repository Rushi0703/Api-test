name: TestRail Sharded Execution

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID from TestRail"
        required: true
        type: string
      titles:
        description: "Test titles as JSON string"
        required: true
        type: string

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Parse titles and create shard matrix
        id: set-matrix
        run: |
          echo "Input titles: ${{ github.event.inputs.titles }}"
          TITLES=$(echo '${{ github.event.inputs.titles }}' | jq length)
          echo "Number of titles: $TITLES"
          SHARDS=$(( TITLES < 4 ? TITLES : 4 ))
          if [ "$SHARDS" -eq 0 ]; then
            echo "No titles provided. Skipping all shards."
            echo '{"include":[]}' > matrix.json
          else
            echo '{ "include": [' > matrix.json
            for i in $(seq 1 $SHARDS); do
              echo "  { \"shardIndex\": $i, \"shardTotal\": $SHARDS }$( [ "$i" -lt "$SHARDS" ] && echo "," )" >> matrix.json
            done
            echo "] }" >> matrix.json
          fi
          echo "Generated matrix:"
          cat matrix.json
          echo "matrix=$(jq -c . < matrix.json)" >> $GITHUB_OUTPUT

  test:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-cache-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Fix vulnerability
        run: npm audit fix

      - name: Install faker
        run: npm install @faker-js/faker

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright
          
      # Install Playwright browsers (only if cache not used)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Write test titles to file
        run: echo '${{ github.event.inputs.titles }}' > test-titles.json

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Playwright tests (headed mode with xvfb-run)
        run: |
          mkdir -p blob-results
          node <<'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');
          const titles = JSON.parse(fs.readFileSync('test-titles.json', 'utf8'));
          if (!titles.length) { console.log("No tests to run."); process.exit(0); }
          const grepPattern = titles.map(t => t.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&')).join('|');
          const shardIndex = process.env.SHARD_INDEX;
          const shardTotal = process.env.SHARD_TOTAL;
      
          // Run tests in headed mode using xvfb-run
          const cmd = `xvfb-run --auto-servernum --server-args='-screen 0 1280x720x24' npx playwright test --headed --grep "${grepPattern}" --shard=${shardIndex}/${shardTotal} --reporter=blob`;
          
          console.log(`Running tests matching pattern: ${grepPattern} (shard ${shardIndex}/${shardTotal})`);
          try {
            execSync(cmd, { stdio: 'inherit' });
          } catch (err) {
            console.warn("Playwright run failed. Possibly no matching tests.");
          }
      
          if (fs.existsSync('.playwright/blob-report')) {
            fs.readdirSync('.playwright/blob-report').forEach(file => {
              fs.copyFileSync(`.playwright/blob-report/${file}`, `blob-results/${file}`);
            });
          } else {
            console.warn("No blob report found.");
          }
          EOF
        env:
          SHARD_INDEX: ${{ matrix.shardIndex }}
          SHARD_TOTAL: ${{ matrix.shardTotal }}



      - name: Upload blob results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-${{ matrix.shardIndex }}
          path: blob-report/

  aggregate-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code (required for Playwright config)
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all blob results
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect blob files
        run: |
          mkdir -p all-blobs
          find artifacts -name "report-*.zip" -exec cp {} all-blobs/ \;
          echo "Collected blobs:"
          ls all-blobs
      
      - name: Merge Playwright reports and convert to JUnit
        run: |
          npx playwright merge-reports --reporter junit all-blobs > merged-results.xml
      
      - name: Upload merged JUnit XML result
        uses: actions/upload-artifact@v4
        with:
          name: merged-junit-result
          path: merged-results.xml
      
      - name: Cleanup blob artifacts
        run: |
          echo "Removing intermediate blob files..."
          rm -rf artifacts all-blobs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install TestRail CLI
        run: |
          python -m pip install --upgrade pip
          pip install trcli

      - name: Upload merged results to TestRail
        env:
          TESTRAIL_USERNAME: ${{ secrets.TESTRAIL_USERNAME }}
          TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
        run: |
            trcli -y -h https://brownbox.testrail.io --username "$TESTRAIL_USERNAME" --key "$TESTRAIL_API_KEY" --project "Demo" parse_junit -f merged-results.xml --run-id ${{ github.event.inputs.run_id }}
